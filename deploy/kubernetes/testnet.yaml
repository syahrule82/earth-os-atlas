# Testnet Deployment Manifests

apiVersion: v1
kind: Namespace
metadata:
  name: atlas-testnet
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-node
  namespace: atlas-testnet
spec:
  replicas: 3
  selector:
    matchLabels:
      app: atlas-node
  template:
    metadata:
      labels:
        app: atlas-node
    spec:
      containers:
      - name: atlas
        image: kosasih/atlas-node:v3.0.0
        ports:
        - containerPort: 54321
          protocol: UDP
        - containerPort: 9090
        env:
        - name: ATLAS_REGION
          value: "0"
        - name: ATLAS_LOG_LEVEL
          value: "DEBUG"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-node
  namespace: atlas-testnet
spec:
  selector:
    app: atlas-node
  ports:
  - name: mesh-udp
    port: 54321
    protocol: UDP
  - name: metrics
    port: 9090
    targetPort: 9090
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-sensor
  namespace: atlas-testnet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hermes-sensor
  template:
    metadata:
      labels:
        app: hermes-sensor
    spec:
      containers:
      - name: hermes
        image: kosasih/hermes-sensor:v3.0.0
        env:
        - name: SENSOR_TYPES
          value: "code_commit,medical,ecological"
        resources:
          limits:
            memory: "256Mi"
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: atlas-metrics
  namespace: atlas-testnet
spec:
  selector:
    matchLabels:
      app: atlas-node
  endpoints:
  - port: metrics
    interval: 30s
